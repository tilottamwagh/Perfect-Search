<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 256 256" width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <title>PerfectSearch — Shri Yantra brand mark</title>
  <defs>
    <!-- Deep crimson tile background -->
    <radialGradient id="bgRad" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#7f1d1d"/>
      <stop offset="1" stop-color="#3f0a0a"/>
    </radialGradient>

    <!-- Golden lotus petal fill -->
    <radialGradient id="petalFill" cx="0.5" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="0.4" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#c2410c"/>
    </radialGradient>

    <!-- Soft cream backdrop inside the inner ring -->
    <radialGradient id="centerFill" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#fffbeb"/>
      <stop offset="0.7" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fcd34d"/>
    </radialGradient>

    <!-- Bindu glow -->
    <radialGradient id="bindu" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#fde047"/>
      <stop offset="1" stop-color="#b45309"/>
    </radialGradient>

    <filter id="petalShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Background tile -->
  <rect width="256" height="256" rx="32" fill="url(#bgRad)"/>

  <!-- ========== Bhupura — bright red double-line square with prominent T-gates ========== -->
  <!-- Outer T-gate protrusions on each cardinal side -->
  <g fill="none" stroke="#dc2626" stroke-width="3">
    <!-- North gate -->
    <path d="M104 22 L104 8 L152 8 L152 22"/>
    <path d="M112 30 L112 22 L144 22 L144 30" stroke-width="2.2"/>
    <!-- South gate -->
    <path d="M104 234 L104 248 L152 248 L152 234"/>
    <path d="M112 226 L112 234 L144 234 L144 226" stroke-width="2.2"/>
    <!-- West gate -->
    <path d="M22 104 L8 104 L8 152 L22 152"/>
    <path d="M30 112 L22 112 L22 144 L30 144" stroke-width="2.2"/>
    <!-- East gate -->
    <path d="M234 104 L248 104 L248 152 L234 152"/>
    <path d="M226 112 L234 112 L234 144 L226 144" stroke-width="2.2"/>
  </g>

  <!-- Main bhupura square frames -->
  <g fill="none" stroke="#dc2626" stroke-width="3">
    <rect x="22" y="22" width="212" height="212" rx="2"/>
  </g>
  <g fill="none" stroke="#fbbf24" stroke-width="1.2">
    <rect x="28" y="28" width="200" height="200" rx="2"/>
  </g>
  <g fill="none" stroke="#dc2626" stroke-width="2">
    <rect x="34" y="34" width="188" height="188" rx="2"/>
  </g>

  <!-- ========== Concentric outer rings (red, like the reference) ========== -->
  <g fill="none" stroke="#dc2626" stroke-width="1.1">
    <circle cx="128" cy="128" r="92"/>
    <circle cx="128" cy="128" r="89" stroke-width="0.7"/>
    <circle cx="128" cy="128" r="86" stroke-width="1.1"/>
  </g>

  <!-- ========== 16-petal outer lotus — golden petals with orange shadow ========== -->
  <g transform="translate(128 128)" filter="url(#petalShadow)">
    <!-- Each petal is an almond shape rendered 16 times at 22.5° spacing -->
    <g><path d="M0 -84 Q -11 -68 0 -56 Q 11 -68 0 -84 Z" fill="url(#petalFill)" stroke="#c2410c" stroke-width="0.8"/></g>
    <g transform="rotate(22.5)"><path d="M0 -84 Q -11 -68 0 -56 Q 11 -68 0 -84 Z" fill="url(#petalFill)" stroke="#c2410c" stroke-width="0.8"/></g>
    <g transform="rotate(45)"><path d="M0 -84 Q -11 -68 0 -56 Q 11 -68 0 -84 Z" fill="url(#petalFill)" stroke="#c2410c" stroke-width="0.8"/></g>
    <g transform="rotate(67.5)"><path d="M0 -84 Q -11 -68 0 -56 Q 11 -68 0 -84 Z" fill="url(#petalFill)" stroke="#c2410c" stroke-width="0.8"/></g>
    <g transform="rotate(90)"><path d="M0 -84 Q -11 -68 0 -56 Q 11 -68 0 -84 Z" fill="url(#petalFill)" stroke="#c2410c" stroke-width="0.8"/></g>
    <g transform="rotate(112.5)"><path d="M0 -84 Q -11 -68 0 -56 Q 11 -68 0 -84 Z" fill="url(#petalFill)" stroke="#c2410c" stroke-width="0.8"/></g>
    <g transform="rotate(135)"><path d="M0 -84 Q -11 -68 0 -56 Q 11 -68 0 -84 Z" fill="url(#petalFill)" stroke="#c2410c" stroke-width="0.8"/></g>
    <g transform="rotate(157.5)"><path d="M0 -84 Q -11 -68 0 -56 Q 11 -68 0 -84 Z" fill="url(#petalFill)" stroke="#c2410c" stroke-width="0.8"/></g>
    <g transform="rotate(180)"><path d="M0 -84 Q -11 -68 0 -56 Q 11 -68 0 -84 Z" fill="url(#petalFill)" stroke="#c2410c" stroke-width="0.8"/></g>
    <g transform="rotate(202.5)"><path d="M0 -84 Q -11 -68 0 -56 Q 11 -68 0 -84 Z" fill="url(#petalFill)" stroke="#c2410c" stroke-width="0.8"/></g>
    <g transform="rotate(225)"><path d="M0 -84 Q -11 -68 0 -56 Q 11 -68 0 -84 Z" fill="url(#petalFill)" stroke="#c2410c" stroke-width="0.8"/></g>
    <g transform="rotate(247.5)"><path d="M0 -84 Q -11 -68 0 -56 Q 11 -68 0 -84 Z" fill="url(#petalFill)" stroke="#c2410c" stroke-width="0.8"/></g>
    <g transform="rotate(270)"><path d="M0 -84 Q -11 -68 0 -56 Q 11 -68 0 -84 Z" fill="url(#petalFill)" stroke="#c2410c" stroke-width="0.8"/></g>
    <g transform="rotate(292.5)"><path d="M0 -84 Q -11 -68 0 -56 Q 11 -68 0 -84 Z" fill="url(#petalFill)" stroke="#c2410c" stroke-width="0.8"/></g>
    <g transform="rotate(315)"><path d="M0 -84 Q -11 -68 0 -56 Q 11 -68 0 -84 Z" fill="url(#petalFill)" stroke="#c2410c" stroke-width="0.8"/></g>
    <g transform="rotate(337.5)"><path d="M0 -84 Q -11 -68 0 -56 Q 11 -68 0 -84 Z" fill="url(#petalFill)" stroke="#c2410c" stroke-width="0.8"/></g>
  </g>

  <!-- Cream backdrop inside the inner ring -->
  <circle cx="128" cy="128" r="54" fill="url(#centerFill)"/>
  <circle cx="128" cy="128" r="54" fill="none" stroke="#c2410c" stroke-width="1.3"/>
  <circle cx="128" cy="128" r="51" fill="none" stroke="#fbbf24" stroke-width="0.6"/>

  <!-- ========== The nine interlocking triangles — solid filled in alternating colors ========== -->
  <!-- Five downward triangles (Shakti) — outermost = green, then blue, then purple -->
  <g stroke="#1e3a8a" stroke-width="1">
    <polygon points="128,174  78,88  178,88"  fill="#22c55e" fill-opacity="0.55"/>
    <polygon points="128,164  86,94  170,94"  fill="#3b82f6" fill-opacity="0.55"/>
    <polygon points="128,154  96,102 160,102" fill="#7c3aed" fill-opacity="0.55"/>
    <polygon points="128,146  106,112 150,112" fill="#3b82f6" fill-opacity="0.6"/>
    <polygon points="128,138  116,120 140,120" fill="#7c3aed" fill-opacity="0.7"/>
  </g>

  <!-- Four upward triangles (Shiva) — outermost = green, then blue, then purple, then pink -->
  <g stroke="#1e3a8a" stroke-width="1">
    <polygon points="128,82   78,168  178,168" fill="#22c55e" fill-opacity="0.55"/>
    <polygon points="128,92   88,162  168,162" fill="#3b82f6" fill-opacity="0.55"/>
    <polygon points="128,104  100,154 156,154" fill="#7c3aed" fill-opacity="0.6"/>
    <polygon points="128,114  112,144 144,144" fill="#ec4899" fill-opacity="0.7"/>
  </g>

  <!-- ========== The Bindu — the central point ========== -->
  <circle cx="128" cy="128" r="5.5" fill="url(#bindu)" stroke="#b45309" stroke-width="0.6"/>
  <circle cx="128" cy="128" r="2" fill="#ffffff"/>
</svg>
